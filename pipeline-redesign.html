<style>
/* Outer modular container box */
.gso-steps-flow-wrapper {
  position: relative;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  padding-top: 10px;
  border-radius: 20px;
  max-width: 1200px;
  margin: auto;
  overflow: hidden;
  box-sizing: border-box;
  color: #eeeeee;
}

.gso-steps-flow-wrapper * {
  box-sizing: border-box;
}

/* Grid layout housing the motherboard circuit track and the nodes */
.gso-steps-flow-container {
  position: relative;
  width: 100%;
  z-index: 2;
}

/* Horizontal motherboard backing trace (Only visible on Desktop) */
.gso-circuit-track {
  position: absolute;
  top: 60px; /* Aligns with the horizontal center line of the circle slots! */
  left: 80px;
  right: 80px;
  height: 2px;
  background: rgba(255, 255, 255, 0.05);
  z-index: 1;
}

/* Step Flex alignment */
.gso-steps-flow {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

/* ========================================================
   ⭕ CYBER-CIRCULAR PROCESS CARD NODES
   ======================================================== */
.gso-step-node {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.gso-circle-slot {
  position: relative;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.06);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

/* Circular scanline sweep */
.gso-circle-scan {
  position: absolute;
  top: -100%;
  left: 0;
  width: 100%;
  height: 50%;
  background: linear-gradient(to bottom, transparent, rgba(97, 206, 112, 0.15));
  border-bottom: 1.5px solid rgba(97, 206, 112, 0.3);
  opacity: 0;
  pointer-events: none;
}

/* Glowing center indicator dot */
.gso-step-glow-indicator {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  background: #61CE70;
  border-radius: 50%;
  box-shadow: 0 0 5px #61CE70;
  opacity: 0.4;
  transition: all 0.3s ease;
}

/* Custom Vector Icon inside Circle slot */
.gso-icon-container {
  color: #8e9196;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.gso-num {
  font-size: 20px;
  font-weight: 900;
  color: #61CE70;
  letter-spacing: -0.5px;
  line-height: 1;
  margin-top: 6px;
  transition: all 0.3s ease;
}

.gso-step-title {
  font-size: 12.5px;
  line-height: 1.45;
  color: #bbbbbb;
  font-weight: 700;
  max-width: 130px;
  transition: all 0.3s ease;
}

/* ========================================================
   💥 100% PURE CSS SEQUENTIAL CHAIN REACTION WAVE
   ======================================================== */
.gso-flow-arrow {
  color: #61CE70;
  opacity: 0.25;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 120px; /* Aligns chevron arrow vertically with the circles! */
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  flex-shrink: 0;
}

/* 7-Second Clock Sequential Glow Loops */
.node-step-1 .gso-circle-slot { animation: sequential-node-glow 7s infinite; animation-delay: 0s; }
.arrow-1 { animation: sequential-arrow-glow 7s infinite; animation-delay: 0.7s; }

.node-step-2 .gso-circle-slot { animation: sequential-node-glow 7s infinite; animation-delay: 1s; }
.arrow-2 { animation: sequential-arrow-glow 7s infinite; animation-delay: 1.7s; }

.node-step-3 .gso-circle-slot { animation: sequential-node-glow 7s infinite; animation-delay: 2s; }
.arrow-3 { animation: sequential-arrow-glow 7s infinite; animation-delay: 2.7s; }

.node-step-4 .gso-circle-slot { animation: sequential-node-glow 7s infinite; animation-delay: 3s; }
.arrow-4 { animation: sequential-arrow-glow 7s infinite; animation-delay: 3.7s; }

.node-step-6 .gso-circle-slot { animation: sequential-node-glow 7s infinite; animation-delay: 5s; }

/* Dynamic Circle Node Glow wave keyframe */
@keyframes sequential-node-glow {
  0% {
    border-color: rgba(255, 255, 255, 0.06);
    background: rgba(255, 255, 255, 0.02);
    transform: translateY(0);
  }
  3% {
    border-color: #FAC643;
    background: rgba(250, 198, 67, 0.04);
    box-shadow: 0 0 20px rgba(250, 198, 67, 0.15);
    transform: translateY(-6px);
  }
  12% {
    border-color: #61CE70;
    background: rgba(97, 206, 112, 0.04);
    box-shadow: 0 0 20px rgba(97, 206, 112, 0.15);
    transform: translateY(-6px);
  }
  16%, 100% {
    border-color: rgba(255, 255, 255, 0.06);
    background: rgba(255, 255, 255, 0.02);
    transform: translateY(0);
  }
}

/* Dynamic Chevron Arrow Flow wave keyframe (Horizontal - Right pointing) */
@keyframes sequential-arrow-glow {
  0%, 6% {
    color: #61CE70;
    opacity: 0.25;
    transform: scale(1);
  }
  11% {
    color: #FAC643;
    opacity: 1;
    transform: scale(1.3) translateX(3px);
    filter: drop-shadow(0 0 8px #FAC643);
  }
  16%, 100% {
    color: #61CE70;
    opacity: 0.25;
    transform: scale(1);
  }
}

/* Dynamic Chevron Arrow Flow wave keyframe (Horizontal - Left pointing / Rotated 180deg) */
@keyframes sequential-arrow-glow-left {
  0%, 6% {
    color: #61CE70;
    opacity: 0.25;
    transform: rotate(180deg) scale(1);
  }
  11% {
    color: #FAC643;
    opacity: 1;
    transform: rotate(180deg) scale(1.3) translateX(3px);
    filter: drop-shadow(0 0 8px #FAC643);
  }
  16%, 100% {
    color: #61CE70;
    opacity: 0.25;
    transform: rotate(180deg) scale(1);
  }
}

/* Dynamic Chevron Arrow Flow wave keyframe (Vertical / Rotated 90deg) */
@keyframes sequential-arrow-glow-vertical {
  0%, 6% {
    color: #61CE70;
    opacity: 0.25;
    transform: rotate(90deg) scale(1);
  }
  11% {
    color: #FAC643;
    opacity: 1;
    transform: rotate(90deg) scale(1.3) translateY(3px);
    filter: drop-shadow(0 0 8px #FAC643);
  }
  16%, 100% {
    color: #61CE70;
    opacity: 0.25;
    transform: rotate(90deg) scale(1);
  }
}

/* ========================================================
   ⚡ MANUAL HOVER CONTROLS (OVERRIDE SEQUENCE FOR USER ACTION)
   ======================================================== */
.gso-step-node:hover {
  transform: translateY(-6px);
}

.gso-step-node:hover .gso-circle-slot {
  animation-play-state: paused;
  border-color: rgba(97, 206, 112, 0.5);
  background: rgba(97, 206, 112, 0.03);
  box-shadow: 0 10px 25px rgba(97, 206, 112, 0.12);
}

.gso-step-node:hover .gso-circle-scan {
  animation: sweep-neon-scanline-circle 1s infinite linear;
}

@keyframes sweep-neon-scanline-circle {
  0% { top: -50%; opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

.gso-step-node:hover .gso-step-glow-indicator {
  opacity: 1;
  background: #FAC643;
  box-shadow: 0 0 10px #FAC643;
}

.gso-step-node:hover .gso-icon-container {
  color: #61CE70;
  transform: scale(1.08);
}

.gso-step-node:hover .gso-num {
  color: #FAC643;
  text-shadow: 0 0 8px rgba(250, 198, 67, 0.3);
}

.gso-step-node:hover .gso-step-title {
  color: #ffffff;
}

/* Standard horizontal arrow hover reaction */
.gso-step-node:hover + .gso-flow-arrow {
  animation-play-state: paused;
  color: #FAC643;
  opacity: 1;
  transform: scale(1.3) translateX(3px);
  filter: drop-shadow(0 0 8px #FAC643);
}

    padding: 40px 20px;

    padding: 10px 0;
    transform: rotate(90deg);
